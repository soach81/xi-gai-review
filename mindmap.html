<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>思维导图 — 习概复习</title>
<style>
:root { --bg: #f0f2f5; --text: #1a1a2e; }
[data-theme="dark"] { --bg: #0f0f1a; --text: #e4e4ed; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
#viewer { width: 100%; height: 100%; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 16px; }
canvas { box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 100%; }
.loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 16px; color: var(--text); z-index: 10; }
.controls { position: fixed; bottom: 16px; right: 16px; display: flex; gap: 6px; z-index: 20; }
.controls button { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #ccc;
  background: #fff; color: #333; font-size: 18px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
[data-theme="dark"] .controls button { background: #1a1a2e; color: #ddd; border-color: #444; }
.controls button:hover { background: #e8e8ed; }
[data-theme="dark"] .controls button:hover { background: #2a2a45; }
</style>
</head>
<body>
<div class="loading" id="loading">加载思维导图中...</div>
<div id="viewer"></div>
<div class="controls">
  <button onclick="zoomIn()" title="放大">+</button>
  <button onclick="zoomOut()" title="缩小">−</button>
  <button onclick="zoomReset()" title="重置">1x</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
var pdfDoc = null, scale = 1.5, baseScale = 1.5;
var viewer = document.getElementById('viewer');
var loading = document.getElementById('loading');

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function renderAllPages() {
  if (!pdfDoc) return;
  viewer.innerHTML = '';
  var totalPages = pdfDoc.numPages;
  for (var i = 1; i <= totalPages; i++) {
    (function(num) {
      pdfDoc.getPage(num).then(function(page) {
        var vp = page.getViewport({ scale: scale });
        var canvas = document.createElement('canvas');
        canvas.width = vp.width;
        canvas.height = vp.height;
        canvas.style.width = vp.width / (window.devicePixelRatio || 1) + 'px';
        canvas.style.height = vp.height / (window.devicePixelRatio || 1) + 'px';
        page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
        viewer.appendChild(canvas);
      });
    })(i);
  }
  loading.style.display = 'none';
}

pdfjsLib.getDocument('data/思维导图.pdf').promise.then(function(pdf) {
  pdfDoc = pdf;
  renderAllPages();
}).catch(function(err) {
  loading.textContent = '加载失败: ' + err.message;
});

function zoomIn() { scale = Math.min(scale * 1.2, 5); renderAllPages(); }
function zoomOut() { scale = Math.max(scale / 1.2, 0.5); renderAllPages(); }
function zoomReset() { scale = baseScale; renderAllPages(); }

// Theme sync from parent
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});
</script>
</body>
</html>
